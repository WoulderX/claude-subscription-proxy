listen_host: 0.0.0.0
listen_port: 8787

mitm:
  port_base: 18000          # each user session takes one port starting here
  ca_cert: /home/coder/.mitmproxy/mitmproxy-ca-cert.pem

claude:
  binary: claude            # path to claude code CLI
  home_template: /data/users/{user_id}   # per-user HOME (so each user has own ~/.claude/)
  restart_interval_seconds: 14400        # 4h — must stay under OAuth token lifetime (~8h) so workers always restart before their in-memory token expires; main process handles refresh on disk

# bearer token -> user_id (scalar) OR list of user_ids (pool).
# A list-form token round-robins requests across the listed workers,
# so a single key in LiteLLM can drive N parallel claude PTYs.
users:
  sk-internal-alice: alice
  sk-internal-bob: bob
  sk-internal-litellm:
    - litellm-0
    - litellm-1
    - litellm-2
