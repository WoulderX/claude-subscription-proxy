# Docker-friendly config: absolute paths under /home/coder and /data.
# Mount this file into the container at /data/config.yaml.

listen_host: 0.0.0.0
listen_port: 8787

mitm:
  # Per-user mitm listener: first user gets 18000, next 18001, etc.
  port_base: 18000
  # mitmproxy auto-generates this on first run; the directory is a named
  # volume in compose so the CA survives restarts. Must match HOME=/home/coder.
  ca_cert: /home/coder/.mitmproxy/mitmproxy-ca-cert.pem

claude:
  binary: claude
  # Each API user gets an isolated HOME under /data/users/<user_id>/.
  # _seed_home copies operator's .claude.json + symlinks .claude/ here.
  home_template: /data/users/{user_id}
  # Must stay under the OAuth token lifetime (~8h). The main process
  # OAuthRefresher keeps .credentials.json on disk fresh, but workers
  # cache the token in memory at startup — restarting them within the
  # token lifetime guarantees they never need to self-refresh and race
  # with the centralised refresher.
  restart_interval_seconds: 14400        # 4h

  # Operational tuning knobs. All optional; defaults match what was
  # previously hardcoded in the source. Adjust only if you actually
  # see the corresponding failure mode under your real workload.
  timeouts:
    mitm_intercept_seconds: 30           # how long mitm has to hijack TUI's outbound /v1/messages
    status_stall_seconds: 30             # /status marks an in-flight request as "stuck" after this many bytes-free seconds
    response_stall_seconds: 90           # mitm watchdog auto-closes a channel if no new chunk arrives in this window (recovers from upstream-sent-tiny-error-and-hung pattern)
    restart_drain_seconds: 60            # scheduled restart waits this long for in-flight streams to finish
    worker_ready_seconds: 60             # how long a new worker has to signal ready on stdout
    prewarm_seconds: 60                  # bootstrap prewarm upper bound (non-fatal on miss)
    restart_check_interval_seconds: 60   # how often the restarter loop polls workers for age-based recycling

# Centralised proactive OAuth token refresh. Eliminates the per-worker
# refresh_token rotation race. Disable only for debugging — with this
# off, workers self-refresh and the multi-worker race can re-emerge.
oauth_refresh:
  enabled: true
  check_interval_seconds: 300                  # how often to check expiry
  refresh_when_expires_within_seconds: 3600    # refresh if token expires within this window

# Bearer/api-key → user_id (scalar) or pool (list). A list-form token
# is round-robined across the listed workers, so a single LiteLLM key
# can drive N parallel claude PTYs in this proxy. Generate keys with:
#     echo "sk-internal-$(openssl rand -hex 24)"
#
# Examples:
#   sk-internal-1bf94b...e3: alice          # single worker, requests serialised
#   sk-internal-7c93af...91:                # pool: 3 parallel workers behind one key
#     - litellm-0
#     - litellm-1
#     - litellm-2
users: {}
